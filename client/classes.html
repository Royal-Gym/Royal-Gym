<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Classes | Royal Gym</title>
  <link rel="stylesheet" href="../css/classes.css">
    <link rel="icon" type="image/png" href="../assets/images/logo.png">
</head>

<body>
  <header>
    <a href="../index.html">
      Royal Gym
      <img src="../assets/images/logo.png" alt="Royal Gym Logo" class="logo">
    </a>
    <button class="menu-toggle" aria-label="Toggle menu">&#9776;</button>
    <nav>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="./classes.html" class="active">Classes</a></li>
        <li><a href="./membership.html">Membership</a></li>
        <li><a href="./trainers.html">Trainers</a></li>
        <li><a href="./contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Our Fitness Classes</h1>
      <p class="tagline">Find the perfect class to reach your fitness goals.</p>
    </section>

    <section id="filters" class="filters-section">
    </section>

    <section class="schedule-container">
      <div class="table-wrapper">
        <table>
          <caption>Weekly Class Schedule</caption>
          <thead>
            <tr>
              <th>Class Name</th>
              <th>Trainer</th>
              <th>Day</th>
              <th>Time</th>
              <th>Duration</th>
              <th>Level</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="classes-body">
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Royale Gym. All rights reserved.</p>
  </footer>
  <script type="module" src="../js/classes.js"></script>
  <script>
    document.querySelector('.menu-toggle').addEventListener('click', function () {
      document.querySelector('header nav').classList.toggle('open');
    });
  </script>
</body>
</html>
